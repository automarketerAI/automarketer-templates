<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
    }

    .frame {
      position: relative;
      width: 1080px;
      height: 1080px;
      background: {{brandColor}};
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 100px;
    }

    /* Subtle texture overlay — fine diagonal lines for depth */
    .frame::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        135deg,
        rgba(255,255,255,0.04) 0px,
        rgba(255,255,255,0.04) 1px,
        transparent 1px,
        transparent 12px
      );
      pointer-events: none;
    }

    /* Large decorative quotation mark — top-right */
    .quote-mark {
      position: absolute;
      top: 48px;
      right: 64px;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 240px;
      line-height: 1;
      color: rgba(255,255,255,0.12);
      user-select: none;
      pointer-events: none;
    }

    /* Thin brand-contrast horizontal rule above hook text */
    .rule {
      width: 72px;
      height: 4px;
      background: rgba(255,255,255,0.55);
      border-radius: 2px;
      margin-bottom: 48px;
      flex-shrink: 0;
    }

    /* Hook — main centered quote text */
    .hook-text {
      font-family: 'Arial', 'Helvetica Neue', Helvetica, sans-serif;
      font-size: 64px;     /* slightly smaller to accommodate 10-15 word sentences */
      font-weight: 800;
      color: #ffffff;
      line-height: 1.35;
      text-align: center;
      direction: rtl;
      letter-spacing: -0.5px;
      text-shadow: 0 3px 16px rgba(0,0,0,0.25);
      overflow-wrap: anywhere;
      word-wrap: break-word;
      word-break: break-word;
      white-space: normal;
      box-sizing: border-box;
      width: 100%;
      max-width: 880px;
      position: relative;
      z-index: 1;
    }

    /* Thin rule below hook text */
    .rule-bottom {
      width: 40px;
      height: 4px;
      background: rgba(255,255,255,0.35);
      border-radius: 2px;
      margin-top: 44px;
      flex-shrink: 0;
    }

    /* Logo — bottom center, inside a light frosted chip */
    .logo-wrap {
      position: absolute;
      bottom: 52px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.18);
      border-radius: 40px;
      padding: 12px 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      max-width: 260px;
    }

    .logo-wrap img {
      height: 44px;
      max-width: 200px;
      object-fit: contain;
      filter: brightness(0) invert(1);
      opacity: 0.92;
    }

    /* Corner decorative circles */
    .corner-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
    }
    .cc-tl { width: 340px; height: 340px; top: -120px; left: -120px; }
    .cc-br { width: 260px; height: 260px; bottom: -80px; right: -80px; }
  </style>
</head>
<body>
  <div class="frame">
    <!-- Decorative geometry -->
    <div class="corner-circle cc-tl"></div>
    <div class="corner-circle cc-br"></div>

    <!-- Large opening quote mark -->
    <div class="quote-mark">"</div>

    <!-- Content column (hidden when hook is empty — e.g. inner carousel slides) -->
    {{#if hook}}
    <div class="rule"></div>
    <div class="hook-text">{{hook}}</div>
    <div class="rule-bottom"></div>
    {{/if}}

    <!-- Logo (shown only when provided) -->
    {{#if logoUrl}}
    <div class="logo-wrap">
      <img src="{{logoUrl}}" alt="logo" />
    </div>
    {{/if}}
  </div>
</body>
</html>
