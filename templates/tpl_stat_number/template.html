<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Assistant', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }

    .frame {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(160deg, #e8eff7 0%, #d4e2f0 40%, #c8d9ec 100%);
    }

    /* Subtle dot-grid texture overlay */
    .dot-grid {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(100,140,180,0.18) 1.5px, transparent 1.5px);
      background-size: 36px 36px;
      z-index: 0;
    }

    /* Constellation lines - decorative SVG corners */
    .deco-svg {
      position: absolute;
      z-index: 1;
      opacity: 0.35;
    }

    /* Bar chart 3D illustration area */
    .chart-area {
      position: absolute;
      bottom: -30px;
      left: -60px;
      width: 680px;
      height: 560px;
      z-index: 2;
    }

    /* Content column - right side */
    .content-col {
      position: absolute;
      top: 0;
      right: 0;
      width: 520px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 72px 80px 40px;
      z-index: 5;
    }

    .eyebrow {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(60,90,130,0.65);
      margin-bottom: 16px;
    }

    .stat-number {
      font-size: 200px;
      font-weight: 900;
      line-height: 0.85;
      letter-spacing: -0.06em;
      color: #1a3a5c;
      position: relative;
      z-index: 1;
    }
    .stat-number .pct {
      font-size: 80px;
      font-weight: 700;
      vertical-align: super;
      letter-spacing: -0.02em;
      color: var(--brand);
    }

    .stat-divider {
      width: 64px;
      height: 4px;
      background: var(--brand);
      border-radius: 2px;
      margin: 28px 0 24px;
    }

    .hook-text {
      font-size: 22px;
      font-weight: 400;
      color: #2c4a6e;
      line-height: 1.6;
      max-width: 340px;
    }

    .hook-text strong {
      font-weight: 700;
      color: #1a3a5c;
    }

    /* Bottom bar */
    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 72px;
      z-index: 10;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(8px);
      border-top: 1px solid rgba(255,255,255,0.5);
    }
    .bottom-handle {
      font-size: 15px;
      font-weight: 600;
      color: rgba(30,60,100,0.5);
      letter-spacing: 0.05em;
    }
    .logo-wrap img {
      max-height: 36px;
      max-width: 130px;
      object-fit: contain;
      opacity: 0.85;
    }

    /* Crown badge top-right */
    .badge-crown {
      position: absolute;
      top: 36px;
      left: 36px;
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      z-index: 10;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    /* Star badge top-right */
    .badge-star {
      position: absolute;
      top: 36px;
      right: 36px;
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: rgba(255,255,255,0.45);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      box-shadow: 0 2px 14px rgba(0,0,0,0.06);
    }

    /* Dots decoration (3×3 grid) */
    .dots-deco {
      position: absolute;
      display: grid;
      grid-template-columns: repeat(4, 7px);
      gap: 5px;
      opacity: 0.3;
      z-index: 3;
    }
    .dots-deco span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #3a6090;
      display: block;
    }
  </style>
</head>
<body style="background:#b0c0d0; display:flex; align-items:center; justify-content:center; min-height:100vh;">

<div class="frame" style="--brand: {{brandColor}};">

  <!-- Dot grid texture -->
  <div class="dot-grid"></div>

  <!-- Constellation deco top-left -->
  <svg class="deco-svg" style="top:60px; right:160px; width:160px; height:120px;" viewBox="0 0 160 120">
    <circle cx="10" cy="60" r="3" fill="#4a7aaa"/>
    <circle cx="80" cy="15" r="3" fill="#4a7aaa"/>
    <circle cx="150" cy="80" r="3" fill="#4a7aaa"/>
    <circle cx="50" cy="100" r="2" fill="#4a7aaa"/>
    <circle cx="120" cy="40" r="2" fill="#4a7aaa"/>
    <line x1="10" y1="60" x2="80" y2="15" stroke="#4a7aaa" stroke-width="1"/>
    <line x1="80" y1="15" x2="150" y2="80" stroke="#4a7aaa" stroke-width="1"/>
    <line x1="10" y1="60" x2="50" y2="100" stroke="#4a7aaa" stroke-width="1"/>
    <line x1="120" y1="40" x2="150" y2="80" stroke="#4a7aaa" stroke-width="1"/>
    <line x1="80" y1="15" x2="120" y2="40" stroke="#4a7aaa" stroke-width="1"/>
  </svg>

  <!-- Constellation deco bottom-right -->
  <svg class="deco-svg" style="bottom:100px; left:20px; width:120px; height:100px;" viewBox="0 0 120 100">
    <circle cx="20" cy="20" r="2.5" fill="#4a7aaa"/>
    <circle cx="90" cy="10" r="2.5" fill="#4a7aaa"/>
    <circle cx="60" cy="70" r="2.5" fill="#4a7aaa"/>
    <circle cx="110" cy="60" r="2" fill="#4a7aaa"/>
    <line x1="20" y1="20" x2="90" y2="10" stroke="#4a7aaa" stroke-width="1"/>
    <line x1="90" y1="10" x2="60" y2="70" stroke="#4a7aaa" stroke-width="1"/>
    <line x1="60" y1="70" x2="110" y2="60" stroke="#4a7aaa" stroke-width="1"/>
  </svg>

  <!-- Dots decoration -->
  <div class="dots-deco" style="top: 200px; right: 50px;">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>
  <div class="dots-deco" style="bottom: 160px; right: 60px;">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>

  <!-- Crown badge -->
  <div class="badge-crown">👑</div>

  <!-- Star badge -->
  <div class="badge-star">
    <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
      <path d="M15 3l2.8 8.6H27l-7.4 5.4 2.8 8.6L15 21l-7.4 5.6 2.8-8.6L3 12.6h9.2L15 3z"
            fill="none" stroke="#3a6090" stroke-width="1.8" stroke-linejoin="round"/>
    </svg>
  </div>

  <!-- 3D Bar chart illustration -->
  <div class="chart-area">
    <svg viewBox="0 0 620 520" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Shadow base ellipses -->
      <ellipse cx="310" cy="470" rx="280" ry="24" fill="rgba(80,120,170,0.12)"/>

      <!-- Bar 1 — tallest, rightmost (brand color tinted) -->
      <!-- Bar shadows (right face) -->
      <path d="M490 100 L530 115 L530 460 L490 445 Z" fill="rgba(180,205,230,0.6)"/>
      <!-- Bar front face -->
      <rect x="430" y="100" width="60" height="345" rx="4" fill="url(#bar5grad)"/>
      <!-- Bar top face -->
      <path d="M430 100 L470 85 L530 100 L490 115 Z" fill="rgba(210,230,248,0.95)"/>

      <!-- Bar 2 -->
      <path d="M380 170 L420 185 L420 460 L380 445 Z" fill="rgba(180,205,230,0.55)"/>
      <rect x="320" y="170" width="60" height="275" rx="4" fill="url(#bar4grad)"/>
      <path d="M320 170 L360 155 L420 170 L380 185 Z" fill="rgba(210,230,248,0.95)"/>

      <!-- Bar 3 -->
      <path d="M270 230 L310 245 L310 460 L270 445 Z" fill="rgba(180,205,230,0.5)"/>
      <rect x="210" y="230" width="60" height="215" rx="4" fill="url(#bar3grad)"/>
      <path d="M210 230 L250 215 L310 230 L270 245 Z" fill="rgba(210,230,248,0.95)"/>

      <!-- Bar 4 -->
      <path d="M160 300 L200 315 L200 460 L160 445 Z" fill="rgba(180,205,230,0.45)"/>
      <rect x="100" y="300" width="60" height="145" rx="4" fill="url(#bar2grad)"/>
      <path d="M100 300 L140 285 L200 300 L160 315 Z" fill="rgba(210,230,248,0.95)"/>

      <!-- Bar 5 — shortest -->
      <path d="M50 370 L90 385 L90 460 L50 445 Z" fill="rgba(180,205,230,0.4)"/>
      <rect x="-10" y="370" width="60" height="75" rx="4" fill="url(#bar1grad)"/>
      <path d="M-10 370 L30 355 L90 370 L50 385 Z" fill="rgba(210,230,248,0.95)"/>

      <!-- Gradients -->
      <defs>
        <linearGradient id="bar5grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#a8c8e8"/>
          <stop offset="100%" stop-color="#7aaad0"/>
        </linearGradient>
        <linearGradient id="bar4grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#aacaea"/>
          <stop offset="100%" stop-color="#7cacd2"/>
        </linearGradient>
        <linearGradient id="bar3grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#acccea"/>
          <stop offset="100%" stop-color="#7eaed4"/>
        </linearGradient>
        <linearGradient id="bar2grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#aeceed"/>
          <stop offset="100%" stop-color="#80b0d6"/>
        </linearGradient>
        <linearGradient id="bar1grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#b0d0ef"/>
          <stop offset="100%" stop-color="#82b2d8"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <!-- Content column -->
  <div class="content-col">
    <div class="eyebrow">נתון מפתח</div>

    <div class="stat-number">
      95<span class="pct" style="color:{{brandColor}}">%</span>
    </div>

    <div class="stat-divider" style="background:{{brandColor}};"></div>

    <p class="hook-text">{{hook}}</p>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <div class="bottom-handle">@automarketer</div>
    <div class="logo-wrap">
      <img src="{{logoUrl}}" alt="logo" onerror="this.style.display='none'">
    </div>
  </div>

</div>
</body>
</html>
