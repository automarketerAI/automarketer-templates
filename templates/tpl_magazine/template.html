<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: #000;
    }

    body { position: relative; }

    .frame {
      position: relative;
      width: 1080px;
      height: 1080px;
      overflow: hidden;
    }

    /* Full-bleed background image */
    .bg {
      position: absolute;
      inset: 0;
      background-image: url('{{imageUrl}}');
      background-size: cover;
      background-position: center;
    }

    /* Gradient overlay — minimal bottom scrim */
    .gradient-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.20) 0%,
        rgba(0,0,0,0.03) 20%,
        transparent 35%
      );
    }

    /* Brand color top bar */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: {{brandColor}};
    }

    /* Business name tag — top-right */
    .biz-tag {
      position: absolute;
      top: 28px;
      right: 40px;
      background: {{brandColor}};
      color: #fff;
      font-family: 'Arial', 'Helvetica Neue', Helvetica, sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 8px 20px;
      border-radius: 4px;
      direction: rtl;
    }

    /* Logo — inline positioned */

    /* Hook text — bottom-left, hook only */
    .hook-text {
      position: absolute;
      bottom: 60px;
      right: 56px;
      left: 56px;
      font-family: 'Arial', 'Helvetica Neue', Helvetica, sans-serif;
      font-size: 52px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.2;
      text-align: right;
      direction: rtl;
      letter-spacing: -1px;
      text-shadow: 0 2px 16px rgba(0,0,0,0.5);
      overflow-wrap: anywhere;
      word-break: break-word;
      white-space: normal;
    }

    /* Grid strategy overlay */
    .grid-frame-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="bg"></div>
    <div class="gradient-overlay"></div>
    <div class="top-bar"></div>

    {{#if businessName}}
    <div class="biz-tag">{{businessName}}</div>
    {{/if}}

    {{#if hook}}
    <div class="hook-text">{{hook}}</div>
    {{/if}}
    <div class="grid-frame-overlay" style="{{gridStyle}}"></div>
  </div>
  {{#if logoUrl}}
  <img src="{{logoUrl}}" style="position:absolute; top:18px; left:18px; max-width:90px; max-height:55px; object-fit:contain; z-index:110; display:block; filter:brightness(0) invert(1);" onerror="this.style.display='none'" alt="logo" />
  {{/if}}
</body>
</html>
