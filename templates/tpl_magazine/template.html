<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: #000;
    }

    .frame {
      position: relative;
      width: 1080px;
      height: 1080px;
      overflow: hidden;
    }

    /* Full-bleed background image */
    .bg {
      position: absolute;
      inset: 0;
      background-image: url('{{imageUrl}}');
      background-size: cover;
      background-position: center;
    }

    /* Heavy gradient overlay bottom-to-top */
    .gradient-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.88) 0%,
        rgba(0,0,0,0.55) 35%,
        rgba(0,0,0,0.15) 60%,
        transparent 100%
      );
    }

    /* Brand color top bar */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: {{brandColor}};
    }

    /* Business name tag — top-right */
    .biz-tag {
      position: absolute;
      top: 28px;
      right: 40px;
      background: {{brandColor}};
      color: #fff;
      font-family: 'Arial', 'Helvetica Neue', Helvetica, sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 8px 20px;
      border-radius: 4px;
      direction: rtl;
    }

    /* Bottom content area */
    .content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0 56px 60px;
    }

    /* Hook text */
    .hook-text {
      font-family: 'Arial', 'Helvetica Neue', Helvetica, sans-serif;
      font-size: 74px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.18;
      text-align: right;
      direction: rtl;
      letter-spacing: -1px;
      text-shadow: 0 2px 16px rgba(0,0,0,0.5);
      overflow-wrap: anywhere;
      word-break: break-word;
      white-space: normal;
      margin-bottom: 24px;
    }

    /* Body text with brand-color right border */
    .body-wrap {
      border-right: 4px solid {{brandColor}};
      padding-right: 20px;
      margin-right: 4px;
    }

    .body-text {
      font-family: 'Arial', 'Helvetica Neue', Helvetica, sans-serif;
      font-size: 30px;
      font-weight: 400;
      color: rgba(255,255,255,0.8);
      line-height: 1.5;
      text-align: right;
      direction: rtl;
      overflow-wrap: anywhere;
      word-break: break-word;
      white-space: normal;
    }

    /* Logo */
    .logo-wrap {
      position: absolute;
      top: 28px;
      left: 40px;
      height: 56px;
    }

    .logo-wrap img {
      height: 56px;
      max-width: 180px;
      object-fit: contain;
      filter: brightness(0) invert(1);
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="bg"></div>
    <div class="gradient-overlay"></div>
    <div class="top-bar"></div>

    {{#if businessName}}
    <div class="biz-tag">{{businessName}}</div>
    {{/if}}

    {{#if logoUrl}}
    <div class="logo-wrap">
      <img src="{{logoUrl}}" alt="logo" />
    </div>
    {{/if}}

    {{#if hook}}
    <div class="content">
      <div class="hook-text">{{hook}}</div>
      <div class="body-wrap">
        <div class="body-text">{{body}}</div>
      </div>
    </div>
    {{/if}}
  </div>
</body>
</html>
