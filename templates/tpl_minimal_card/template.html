<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: #000;
    }

    .frame {
      position: relative;
      width: 1080px;
      height: 1080px;
      overflow: hidden;
    }

    /* Full-bleed photo */
    .bg-photo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    /* Frosted-glass panel — bottom 32% */
    .glass-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 346px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 4px solid {{brandColor}};
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      direction: rtl;
    }

    .hook-text {
      font-family: 'Arial', 'Helvetica Neue', Helvetica, sans-serif;
      font-size: 48px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.25;
      text-align: right;
      overflow-wrap: anywhere;
      word-break: break-word;
      white-space: normal;
    }

    /* Logo — top-left corner */
    .logo-wrap {
      position: absolute;
      top: 48px;
      left: 48px;
      height: 52px;
    }

    .logo-wrap img {
      height: 52px;
      max-width: 140px;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="frame">
    <img class="bg-photo" src="{{imageUrl}}" alt="" />

    {{#if hook}}
    <div class="glass-panel">
      <div class="hook-text">{{hook}}</div>
    </div>
    {{/if}}

    {{#if logoUrl}}
    <div class="logo-wrap">
      <img src="{{logoUrl}}" alt="logo" />
    </div>
    {{/if}}
  </div>
</body>
</html>
