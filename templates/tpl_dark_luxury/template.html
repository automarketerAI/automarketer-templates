<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: #111111;
    }

    .frame {
      position: relative;
      width: 1080px;
      height: 1080px;
      overflow: hidden;
    }

    /* Full-bleed photo via <img> so Puppeteer loads it reliably */
    .bg-photo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 1;
    }

    /* Gradient overlay — transparent top 45%, very light dark only at bottom */
    .gradient-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.35) 0%,
        rgba(0,0,0,0.08) 30%,
        transparent 45%
      );
    }

    /* Hook text — white, bottom, with text-shadow for contrast */
    .hook-text {
      position: absolute;
      bottom: 72px;
      right: 64px;
      left: 64px;
      font-family: 'Arial', 'Helvetica Neue', Helvetica, sans-serif;
      font-size: 56px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.25;
      text-align: right;
      direction: rtl;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      overflow-wrap: anywhere;
      word-break: break-word;
      white-space: normal;
    }

    /* Logo — top-left, white */
    .logo-wrap {
      position: absolute;
      top: 56px;
      left: 56px;
      height: 52px;
    }

    .logo-wrap img {
      height: 52px;
      max-width: 80px;
      object-fit: contain;
      filter: brightness(0) invert(1);
      opacity: 1;
    }

    /* Grid strategy overlay — sits above all content, pointer-events:none */
    .grid-frame-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div class="frame">
    <img class="bg-photo" src="{{imageUrl}}" alt="" />
    <div class="gradient-overlay"></div>

    {{#if hook}}
    <div class="hook-text">{{hook}}</div>
    {{/if}}

    {{#if logoUrl}}
    <div class="logo-wrap">
      <img src="{{logoUrl}}" alt="logo" />
    </div>
    {{/if}}
    <div class="grid-frame-overlay" style="{{gridStyle}}"></div>
  </div>
</body>
</html>
