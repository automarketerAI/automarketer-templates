<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: #0a0a0a;
    }

    .frame {
      position: relative;
      width: 1080px;
      height: 1080px;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 90px;
    }

    /* Background image at low opacity */
    .bg {
      position: absolute;
      inset: 0;
      background-image: url('{{imageUrl}}');
      background-size: cover;
      background-position: center;
      opacity: 0.35;
    }

    /* Gold decorative lines top */
    .gold-line-top {
      position: absolute;
      top: 48px;
      left: 56px;
      right: 56px;
      height: 1px;
      background: linear-gradient(to right, transparent, #D1B894, transparent);
    }

    /* Gold decorative lines bottom */
    .gold-line-bottom {
      position: absolute;
      bottom: 48px;
      left: 56px;
      right: 56px;
      height: 1px;
      background: linear-gradient(to right, transparent, #D1B894, transparent);
    }

    /* Corner brackets */
    .bracket {
      position: absolute;
      width: 40px;
      height: 40px;
      border-color: #D1B894;
      border-style: solid;
      opacity: 0.7;
    }
    .bracket-tl { top: 36px; right: 44px; border-width: 2px 0 0 2px; border-right: none; border-bottom: none; }
    .bracket-tr { top: 36px; left: 44px;  border-width: 2px 2px 0 0; border-left: none; border-bottom: none; }
    .bracket-bl { bottom: 36px; right: 44px; border-width: 0 0 2px 2px; border-right: none; border-top: none; }
    .bracket-br { bottom: 36px; left: 44px;  border-width: 0 2px 2px 0; border-left: none; border-top: none; }

    /* Hook text in gold */
    .hook-text {
      font-family: 'Arial', 'Helvetica Neue', Helvetica, sans-serif;
      font-size: 72px;
      font-weight: 700;
      color: #D1B894;
      line-height: 1.25;
      text-align: center;
      direction: rtl;
      letter-spacing: -1px;
      overflow-wrap: anywhere;
      word-break: break-word;
      white-space: normal;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    /* Body text */
    .body-text {
      font-family: 'Arial', 'Helvetica Neue', Helvetica, sans-serif;
      font-size: 36px;
      font-weight: 300;
      color: rgba(255,255,255,0.55);
      line-height: 1.5;
      text-align: center;
      direction: rtl;
      overflow-wrap: anywhere;
      word-break: break-word;
      white-space: normal;
      width: 100%;
      max-width: 820px;
      margin-top: 36px;
      position: relative;
      z-index: 1;
    }

    /* Logo — top-right (white inverted) */
    .logo-wrap {
      position: absolute;
      top: 72px;
      right: 72px;
      height: 52px;
    }

    .logo-wrap img {
      height: 52px;
      max-width: 180px;
      object-fit: contain;
      filter: brightness(0) invert(1);
      opacity: 0.85;
    }

    /* Business name — top-left in gold uppercase */
    .biz-name {
      position: absolute;
      top: 86px;
      left: 72px;
      font-family: 'Arial', 'Helvetica Neue', Helvetica, sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: #D1B894;
      letter-spacing: 3px;
      text-transform: uppercase;
      direction: rtl;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="bg"></div>
    <div class="gold-line-top"></div>
    <div class="gold-line-bottom"></div>
    <div class="bracket bracket-tl"></div>
    <div class="bracket bracket-tr"></div>
    <div class="bracket bracket-bl"></div>
    <div class="bracket bracket-br"></div>

    {{#if hook}}
    <div class="hook-text">{{hook}}</div>
    <div class="body-text">{{body}}</div>
    {{/if}}

    {{#if logoUrl}}
    <div class="logo-wrap">
      <img src="{{logoUrl}}" alt="logo" />
    </div>
    {{/if}}

    {{#if businessName}}
    <div class="biz-name">{{businessName}}</div>
    {{/if}}
  </div>
</body>
</html>
